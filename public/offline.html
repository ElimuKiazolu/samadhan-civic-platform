<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samadhan — offline</title>
    <style>
      body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #F4F6F5; color: #16181D; font-family: ui-monospace, "JetBrains Mono", monospace; text-align: center; padding: 24px; }
      .card { max-width: 320px; }
      h1 { font-size: 16px; text-transform: uppercase; letter-spacing: .08em; color: #0A4F4C; }
      p { font-size: 12px; color: #4A505B; line-height: 1.6; }
      .mark { width: 44px; height: 44px; border-radius: 50%; background: #ECF4F3; border: 2px solid #0E6F6B;
        color: #0E6F6B; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 20px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">⬡</div>
      <h1>You're offline</h1>
      <p>Samadhan needs a connection to load the live civic feed. Your place is saved — reconnect and it'll pick up where you left off.</p>
    </div>
  </body>
</html>
